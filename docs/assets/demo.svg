<svg xmlns="http://www.w3.org/2000/svg" width="780" height="470" viewBox="0 0 780 470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="780" height="470" rx="10" fill="#0d1117"/>
  <rect width="780" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="390" y="21" fill="#8b949e" text-anchor="middle">plumbline — the MCP config doctor that knows each client</text>

  <text x="24" y="64" fill="#7ee787">$ plumbline check claude_desktop_config.json</text>
  <text x="24" y="90" fill="#c9d1d9">claude_desktop_config.json — Claude Desktop (auto-detected): 5 server(s)</text>

  <text x="24" y="120" fill="#c9d1d9">  <tspan fill="#f85149">error E130</tspan> github › command  [line 4]</text>
  <text x="24" y="140" fill="#8b949e">      no shell splits "npx -y server-github" into a program plus flags —</text>
  <text x="24" y="158" fill="#8b949e">      the OS looks for a program with that literal name</text>
  <text x="24" y="178" fill="#3fb950">      fix: "command": "npx", "args": ["-y", "server-github"]</text>

  <text x="24" y="208" fill="#c9d1d9">  <tspan fill="#f85149">error E126</tspan> tickets › url  [line 16]</text>
  <text x="24" y="228" fill="#8b949e">      Claude Desktop cannot launch remote servers from this file</text>
  <text x="24" y="248" fill="#3fb950">      fix: bridge it: "command": "npx", "args": ["-y", "mcp-remote", ...]</text>

  <text x="24" y="278" fill="#c9d1d9">  <tspan fill="#f85149">error E125</tspan> notes › cmd  [line 19]</text>
  <text x="24" y="298" fill="#8b949e">      `cmd` is not a key Claude Desktop reads (did you mean `command`?)</text>

  <text x="24" y="328" fill="#c9d1d9">  <tspan fill="#d29922">warning W206</tspan> filesystem › args  [line 8]</text>
  <text x="24" y="348" fill="#8b949e">      npx without -y stops at the install prompt — no terminal to answer it</text>

  <text x="24" y="378" fill="#c9d1d9">  <tspan fill="#d29922">warning W208</tspan> filesystem › args  [line 9]</text>
  <text x="24" y="398" fill="#8b949e">      "~/Documents" will not be expanded — there is no shell in the launch path</text>

  <text x="24" y="436" fill="#c9d1d9">plumbline: <tspan fill="#f85149">FAIL</tspan> — 5 error(s), 5 warning(s), 0 info (fail-on: warning)  <tspan fill="#8b949e">exit 1</tspan></text>
</svg>
